<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Update Categories → Firestore</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 30px; }
    h1 { color: #B8935A; margin-bottom: 20px; }
    button { background: #B8935A; color: white; border: none; padding: 12px 28px; font-size: 1rem; cursor: pointer; border-radius: 4px; }
    button:hover { background: #9c7e5a; }
    #log { margin-top: 24px; line-height: 2; }
    .ok  { color: #6fcf97; }
    .err { color: #eb5757; }
    .info { color: #aaa; }
  </style>
</head>
<body>
  <h1>🏷️ Update Categories → Firestore</h1>
  <p class="info">Actualiza el campo category de los 33 museos.</p>
  <br/>
  <button onclick="updateAll()">⬆️ Update all categories</button>
  <div id="log"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqxu8_hC5cw_-p4mufOuxCOC8ZpEgROHI",
      authDomain: "museums-wsb.firebaseapp.com",
      projectId: "museums-wsb",
      storageBucket: "museums-wsb.firebasestorage.app",
      messagingSenderId: "560360740833",
      appId: "1:560360740833:web:6dfe7cb23bf94ee49a64a0"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const categories = [
      { id: "id_01", category: "History & Art" },
      { id: "id_02", category: "Art gallery" },
      { id: "id_03", category: "History" },
      { id: "id_04", category: "History & Art" },
      { id: "id_05", category: "History" },
      { id: "id_06", category: "Historic museum" },
      { id: "id_07", category: "Industrial museum" },
      { id: "id_08", category: "Industrial museum" },
      { id: "id_09", category: "Historic museum" },
      { id: "id_10", category: "Technology museum" },
      { id: "id_11", category: "Art gallery" },
      { id: "id_12", category: "Industrial museum" },
      { id: "id_13", category: "Art" },
      { id: "id_14", category: "Historic museum" },
      { id: "id_15", category: "Historic museum" },
      { id: "id_16", category: "Industrial museum" },
      { id: "id_17", category: "Historic museum" },
      { id: "id_18", category: "Historic museum" },
      { id: "id_19", category: "Historic museum" },
      { id: "id_20", category: "Industrial museum" },
      { id: "id_21", category: "Historic museum" },
      { id: "id_22", category: "Historic museum" },
      { id: "id_23", category: "Industrial museum" },
      { id: "id_24", category: "Local history museum" },
      { id: "id_25", category: "Local history museum" },
      { id: "id_26", category: "Museum" },
      { id: "id_27", category: "Ethnography" },
      { id: "id_28", category: "Ethnography" },
      { id: "id_29", category: "Historic museum" },
      { id: "id_30", category: "Historic museum" },
      { id: "id_31", category: "Historic museum" },
      { id: "id_32", category: "Local history museum" },
      { id: "id_33", category: "Science" }
    ];

    window.updateAll = async function() {
      const log = document.getElementById('log');
      log.innerHTML = '<p class="info">Starting update...</p>';

      for (const { id, category } of categories) {
        try {
          await updateDoc(doc(db, "museums", id), { category });
          log.innerHTML += `<p class="ok">✅ ${id} → ${category}</p>`;
        } catch (e) {
          log.innerHTML += `<p class="err">❌ ${id} — ${e.message}</p>`;
        }
      }

      log.innerHTML += '<p class="ok" style="margin-top:16px;font-size:1.1rem">🎉 Done! All categories updated.</p>';
    };
  </script>
</body>
</html>
