    window.uploadAll = async function() {
      const log = document.getElementById('log');
      log.innerHTML = '<p class="info">Starting upload...</p>';

      for (const museum of museums) {
        try {
          await setDoc(doc(db, "museums", museum.id), museum);
          log.innerHTML += `<p class="ok">✅ ${museum.id} — ${museum.name}</p>`;
        } catch (e) {
          log.innerHTML += `<p class="err">❌ ${museum.id} — ${e.message}</p>`;
        }
      }

      log.innerHTML += '<p class="ok" style="margin-top:16px;font-size:1.1rem">🎉 Done! All museums uploaded to Firestore.</p>';
    };
  </script>
</body>
</html>
