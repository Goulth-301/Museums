<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f4f4f4, #e0e0e0);
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

input:focus {
    border-color: #28a745;
    outline: none;
    box-shadow: 0 0 5px rgba(40,167,69,0.3);
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #28a745, #218838);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#message {
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
}

.success {
    color: green;
}

.error {
    color: red;
}
    </style>

    </head>
    <title>Payment Page</title>
</head>
<body>
    <div class="container">
        
        <h1>Payment Information</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required>
            </div>
            <div class="form-group">
                <label for="cardName">Cardholder Name</label>
                <input type="text" id="cardName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="expiryDate">Expiry Date</label>
                <input type="month" id="expiryDate" required>
            </div>
            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" required>
            </div>
            <button type="submit">Pay Now</button>
        </form>
        <div id="message"></div>
    </div>

    <script src="script.js">
        // Format card number automatically
document.getElementById("cardNumber").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    value = value.replace(/(.{4})/g, "$1 ").trim();
    e.target.value = value;
});

// Form submission
document.getElementById('paymentForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const cardNumber = document.getElementById('cardNumber').value;
    const cardName = document.getElementById('cardName').value;
    const expiryDate = document.getElementById('expiryDate').value;
    const cvv = document.getElementById('cvv').value;

    const cleanCardNumber = cardNumber.replace(/\s/g, "");

    // Validation
    if (!/^\d{16}$/.test(cleanCardNumber)) {
        displayMessage('Invalid card number (must be 16 digits).', 'error');
        return;
    }

    if (!/^[a-zA-Z\s]+$/.test(cardName)) {
        displayMessage('Invalid name.', 'error');
        return;
    }

    if (!expiryDate) {
        displayMessage('Invalid expiry date.', 'error');
        return;
    }

    const today = new Date();
    const selectedDate = new Date(expiryDate);

    if (selectedDate < today) {
        displayMessage('Card has expired.', 'error');
        return;
    }

    if (!/^\d{3}$/.test(cvv)) {
        displayMessage('Invalid CVV (3 digits).', 'error');
        return;
    }

    // Simulate payment processing
    const button = document.querySelector("button");
    button.disabled = true;
    button.textContent = "Processing...";

    setTimeout(() => {
        displayMessage('Payment successful! (demo only)', 'success');
        button.disabled = false;
        button.textContent = "Pay Now";
    }, 2000);
});

// Display message
function displayMessage(message, type) {
    const messageDiv = document.getElementById('message');
    messageDiv.textContent = message;

    messageDiv.classList.remove('success', 'error');
    messageDiv.classList.add(type);
}
    </script>
</body>
</html>
